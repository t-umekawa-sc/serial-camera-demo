<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>製造番号カメラデモ</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <section class="camera-screen">
        <video id="video" autoplay playsinline muted></video>

        <div class="guide-box">
          <span class="guide-label">製造番号の先頭をマークに合わせる</span>
          <span class="start-marker"></span>
          <span class="baseline"></span>
        </div>

        <div class="top-status">
          <div id="statusText">カメラ準備中...</div>
          <div id="captureCount">撮影済み：0枚</div>
        </div>

        <div class="bottom-actions">
          <button id="captureButton" class="primary-button" type="button">
            撮影する
          </button>

          <div class="sub-actions">
            <button id="showListButton" class="secondary-button" type="button">
              一覧確認
            </button>
            <button id="uploadButton" class="secondary-button" type="button">
              一括アップロード
            </button>
          </div>
        </div>
      </section>

      <section id="listPanel" class="list-panel hidden">
        <div class="list-header">
          <h2>撮影済み画像一覧</h2>
          <button id="closeListButton" class="secondary-button" type="button">
            閉じる
          </button>
        </div>

        <p class="list-note">
          今回のデモでは、アップロード処理はダミーです。実運用では、この画像をまとめてサーバへ送信します。
        </p>

        <div id="thumbnailList" class="thumbnail-list"></div>
      </section>

      <canvas id="workCanvas" class="hidden"></canvas>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
